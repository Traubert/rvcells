<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Grid lines (subtle, showing through the curve) -->
  <g stroke="#3a3a5a" stroke-width="0.5" opacity="0.5">
    <!-- Vertical grid lines -->
    <line x1="6" y1="4" x2="6" y2="44"/>
    <line x1="16" y1="4" x2="16" y2="44"/>
    <line x1="26" y1="4" x2="26" y2="44"/>
    <line x1="36" y1="4" x2="36" y2="44"/>
    <!-- Horizontal grid lines -->
    <line x1="4" y1="8" x2="44" y2="8"/>
    <line x1="4" y1="14" x2="44" y2="14"/>
    <line x1="4" y1="20" x2="44" y2="20"/>
    <line x1="4" y1="26" x2="44" y2="26"/>
    <line x1="4" y1="32" x2="44" y2="32"/>
    <line x1="4" y1="38" x2="44" y2="38"/>
    <line x1="4" y1="44" x2="44" y2="44"/>
  </g>

  <!-- Filled bell curve (semi-transparent so grid shows through) -->
  <path
    d="M 4,44
       C 4,44 8,43.5 10,42
       C 12,40 14,36 16,30
       C 18,24 20,16 22,12
       C 23,9 23.5,7.5 24,7
       C 24.5,7.5 25,9 26,12
       C 28,16 30,24 32,30
       C 34,36 36,40 38,42
       C 40,43.5 44,44 44,44
       L 44,44 L 4,44 Z"
    fill="#6c63ff"
    opacity="0.3"
  />

  <!-- Bell curve outline -->
  <path
    d="M 4,44
       C 4,44 8,43.5 10,42
       C 12,40 14,36 16,30
       C 18,24 20,16 22,12
       C 23,9 23.5,7.5 24,7
       C 24.5,7.5 25,9 26,12
       C 28,16 30,24 32,30
       C 34,36 36,40 38,42
       C 40,43.5 44,44 44,44"
    fill="none"
    stroke="#6c63ff"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Grid lines on top of the fill (to show through) -->
  <g stroke="#3a3a5a" stroke-width="0.4" opacity="0.25">
    <line x1="6" y1="4" x2="6" y2="44"/>
    <line x1="16" y1="4" x2="16" y2="44"/>
    <line x1="26" y1="4" x2="26" y2="44"/>
    <line x1="36" y1="4" x2="36" y2="44"/>
    <line x1="4" y1="8" x2="44" y2="8"/>
    <line x1="4" y1="14" x2="44" y2="14"/>
    <line x1="4" y1="20" x2="44" y2="20"/>
    <line x1="4" y1="26" x2="44" y2="26"/>
    <line x1="4" y1="32" x2="44" y2="32"/>
    <line x1="4" y1="38" x2="44" y2="38"/>
  </g>
</svg>
